<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow - Sistema de Estoque</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="locked">

  <section id="login-screen" class="login-screen">
    <form id="login-form" class="login-card">
      <div class="brand login-brand">
        <div class="brand-mark">S</div>
        <div>
          <strong>StockFlow</strong>
          <span>Acesso operacional</span>
        </div>
      </div>
      <div class="flow-title">
        <p class="eyebrow">Entrar</p>
        <h2>Acesse sua conta</h2>
      </div>
      <label>
        Usuário
        <input id="login-user" type="text" placeholder="Digite seu usuário" required>
      </label>
      <label>
        Senha
        <input id="login-pin" type="password" placeholder="Digite sua senha" required>
      </label>
      <button type="submit" class="primary-action wide">Entrar</button>
      <p id="login-error" class="login-error"></p>
    </form>
  </section>

  <div class="app-shell">
    
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">S</div>
        <div>
          <strong>StockFlow</strong>
          <span id="user-role-badge">Carregando...</span>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" onclick="switchView('main-view')">Início</button>
        <button class="nav-item view-admin-only" onclick="switchView('inventory')">Inventário Geral</button>
        <button class="nav-item view-admin-only" onclick="switchView('history')">Histórico de Retiradas</button>
      </nav>

      <div class="sidebar-footer">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="status-dot"></div>
          <span id="connected-user-name">Usuário</span>
        </div>
        <button class="ghost-action wide" style="margin-top: 12px;" onclick="logout()">Sair</button>
      </div>
    </aside>

    <main class="workspace">
      
      <div class="topbar">
        <div>
          <p class="eyebrow">Painel Operacional</p>
          <h1 id="view-title">Início</h1>
        </div>
      </div>

      <div id="role-technician-content" style="display: none;">
        <div class="flow-layout">
          <div class="flow-card">
            <div class="flow-title">
              <p class="eyebrow">Retirada de Insumo</p>
              <h2>Escaneie o código ou selecione a ação</h2>
            </div>
            
            <div class="stepper">
              <div class="step done"></div>
              <div class="step"></div>
              <div class="step"></div>
              <div class="step"></div>
            </div>

            <div class="scan-row" style="margin-bottom: 20px;">
              <input type="text" class="scan-input" placeholder="Bipar código de barras..." autofocus>
              <button class="primary-action">Bipar</button>
            </div>

            <div class="choice-grid">
              <button class="choice" onclick="alert('Retirada Normal iniciada')">Retirada Comum</button>
              <button class="choice" onclick="alert('Devolução iniciada')">Devolver Item</button>
            </div>
          </div>
        </div>
      </div>

      <div id="role-admin-content" style="display: none;">
        
        <div id="view-main-view" class="view active">
          <div class="metrics-grid" style="margin-bottom: 20px;">
            <div class="metric">
              <span>Total de Insumos</span>
              <strong id="admin-total-items">0</strong>
            </div>
            <div class="metric danger">
              <span>Abaixo do Mínimo</span>
              <strong id="admin-critical-items">0</strong>
            </div>
          </div>

          <div class="dashboard-grid">
            <div class="panel">
              <div class="panel-head">
                <h2>Gerenciamento de Inventário</h2>
                <button class="primary-action" onclick="alert('Abrir modal de cadastro')">+ Novo Insumo</button>
              </div>
              
              <div class="compact-list" id="admin-inventory-list">
                </div>
            </div>

            <div class="panel">
              <div class="panel-head">
                <h2>Aprovações Pendentes</h2>
              </div>
              <div class="request-list" id="admin-requests-list">
                </div>
            </div>
          </div>
        </div>

        <div id="view-inventory" class="view">
          <div class="panel">
            <h2>Lista Completa de Itens</h2>
            </div>
        </div>

      </div>

    </main>
  </div>

  <script>
    let appState = { users: [], items: [], requests: [] };

    async function initBootstrap() {
      const sessionUser = localStorage.getItem("currentUser");
      if (sessionUser) {
        setupUserSession(JSON.parse(sessionUser));
        return;
      }
      try {
        const response = await fetch('/api/bootstrap');
        if (response.ok) appState = await response.json();
      } catch (error) {
        console.warn("⚠️ Modo contingência ativo.");
      }
    }

    // Processamento do Formulário de Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('login-user').value;
      const pin = document.getElementById('login-pin').value;
      const errorEl = document.getElementById('login-error');
      
      errorEl.textContent = '';
      errorEl.style.display = 'none';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, pin })
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "Acesso recusado.");

        localStorage.setItem("currentUser", JSON.stringify(result.user));
        
        // Destrava a tela aplicando as regras de visualização separada!
        setupUserSession(result.user, result.state);

      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });

    // SISTEMA DE SEPARAÇÃO VISUAL DE CARGOS (ADMIN vs TÉCNICO)
    function setupUserSession(user, freshState) {
      if (freshState) appState = freshState;

      // 1. Destrava a tela ocultando a tela de login via CSS
      document.body.classList.remove('locked');

      // 2. Preenche os dados de perfil na barra lateral
      document.getElementById('connected-user-name').textContent = user.name;
      document.getElementById('user-role-badge').textContent = user.role.toUpperCase();

      // 3. SEPARAÇÃO CIRÚRGICA DE INTERFACES:
      const adminContainer = document.getElementById('role-admin-content');
      const techContainer = document.getElementById('role-technician-content');
      const adminNavItems = document.querySelectorAll('.view-admin-only');

      if (user.role === 'admin') {
        // Mostra o ecossistema do Admin e esconde o do Técnico
        adminContainer.style.display = 'block';
        techContainer.style.display = 'none';
        adminNavItems.forEach(item => item.style.display = 'block');
        document.getElementById('view-title').textContent = "Painel Administrador";
      } else {
        // Mostra o ecossistema do Técnico (Fluxos, bips, scanner) e esconde o do Admin
        adminContainer.style.display = 'none';
        techContainer.style.display = 'block';
        adminNavItems.forEach(item => item.style.display = 'none');
        document.getElementById('view-title').textContent = "Área Técnica";
      }

      // Dispara a carga das tabelas caso existam dados
      fetch('/api/bootstrap')
        .then(res => res.json())
        .then(data => {
          appState = data;
          renderAdminPanel();
        }).catch(err => console.log("Aguardando sincronismo..."));
    }

    // Preenche as informações na parte do admin
    function renderAdminPanel() {
      if (!appState.items) return;
      
      document.getElementById('admin-total-items').textContent = appState.items.length;
      const critical = appState.items.filter(i => i.qty <= (i.min || 0)).length;
      document.getElementById('admin-critical-items').textContent = critical;

      const list = document.getElementById('admin-inventory-list');
      if (list) {
        list.innerHTML = '';
        appState.items.forEach(item => {
          const isCritical = item.qty <= (item.min || 0);
          const div = document.createElement('div');
          div.className = 'compact-row';
          div.innerHTML = `
            <strong>${item.name}</strong>
            <span class="muted">${item.code}</span>
            <span style="font-weight:700;">${item.qty} un</span>
            <span class="pill ${isCritical ? 'critical' : ''}">${isCritical ? 'Crítico' : 'Ok'}</span>
          `;
          list.appendChild(div);
        });
      }
    }

    // Chaveador de abas internas para o administrador
    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const targetView = document.getElementById(`view-${viewId}`);
      if (targetView) targetView.classList.add('active');
    }

    function logout() {
      localStorage.removeItem("currentUser");
      document.body.classList.add('locked');
      window.location.reload();
    }

    document.addEventListener('DOMContentLoaded', initBootstrap);
  </script>
</body>
</html>
