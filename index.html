<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow - Gestão de Estoque</title>
  <style>
    :root {
      --bg-color: #121214;
      --card-bg: #1a1a1e;
      --text-color: #ffffff;
      --text-secondary: #a8a8b3;
      --primary-color: #e51e3d;
      --primary-hover: #c21330;
      --input-bg: #202024;
      --border-color: #29292e;
      --success-color: #04d361;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* CONTAINER DE LOGIN */
    .login-container {
      background-color: var(--card-bg);
      padding: 2.5rem;
      border-radius: 8px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .logo-box {
      background-color: var(--primary-color);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 1.4rem;
    }

    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .header-text p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .title-section {
      margin-bottom: 1.5rem;
    }

    .title-section p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.3rem;
    }

    .title-section h2 {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    select, input {
      width: 100%;
      padding: 0.85rem;
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-color);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      border-color: var(--primary-color);
    }

    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a8a8b3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1em;
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      background-color: var(--primary-hover);
    }

    .error-msg {
      color: #ff3333;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    /* CONTAINER DO PAINEL PRINCIPAL (ESCONDIDO POR PADRÃO) */
    #dashboard-container {
      display: none;
      width: 100%;
      max-width: 1200px;
      padding: 2rem;
      align-self: flex-start;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 2rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge-role {
      background-color: #29292e;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--primary-color);
      font-weight: bold;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-logout:hover {
      border-color: var(--primary-color);
      color: white;
    }

    .grid-dashboard {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .grid-dashboard {
        grid-template-columns: 2fr 1fr;
      }
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .card h3 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    /* TABELAS SIMPLES PARA ITENS E HISTÓRICO */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.5rem;
    }

    th, td {
      text-align: left;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }

    th {
      color: var(--text-secondary);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div id="login-screen" class="login-container">
    <div class="header-logo">
      <div class="logo-box">s</div>
      <div class="header-text">
        <h1>StockFlow</h1>
        <p>Acesso operacional</p>
      </div>
    </div>

    <div class="title-section">
      <p>Entrar</p>
      <h2>Selecione seu usuário</h2>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="user-select">Usuário</label>
        <select id="user-select" required>
          <option value="" disabled selected>Carregando usuários...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="pin-input">PIN</label>
        <input type="password" id="pin-input" placeholder="0000" maxlength="10" required />
      </div>

      <div id="error-message" class="error-msg"></div>

      <button type="submit" class="btn-submit">Entrar</button>
    </form>
  </div>

  <div id="dashboard-container">
    <div class="nav-bar">
      <div class="user-info">
        <div class="logo-box" style="width:32px; height:32px; font-size:1rem;">s</div>
        <h2>StockFlow <span style="font-weight: 300; font-size: 1.2rem;">| Painel</span></h2>
      </div>
      <div class="user-info">
        <span id="nav-user-name" style="font-weight: 600;">---</span>
        <span id="nav-user-role" class="badge-role">---</span>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="grid-dashboard">
      <div class="card">
        <h3>Insumos em Estoque</h3>
        <div style="overflow-x: auto;">
          <table id="items-table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Qtd</th>
                <th>Mín</th>
                <th>Fornecedor</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="6" style="text-align:center; color:var(--text-secondary);">Nenhum insumo carregado.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>Solicitações Recentes</h3>
        <table id="requests-table">
          <thead>
            <tr>
              <th>Técnico</th>
              <th>Item</th>
              <th>Qtd</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="3" style="text-align:center; color:var(--text-secondary);">Nenhuma pendência.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let appState = {
      users: [],
      items: [],
      requests: [],
      history: []
    };

    // Função executada ao carregar a página
    async function initBootstrap() {
      // Se o usuário já tiver uma sessão válida salva no navegador, pula a tela de login
      const savedUser = localStorage.getItem("currentUser");
      if (savedUser) {
        const user = JSON.parse(savedUser);
        showDashboard(user);
        return;
      }

      try {
        const response = await fetch('/api/bootstrap');
        if (!response.ok) throw new Error("Erro na resposta do servidor");
        
        const data = await response.json();
        appState.users = data.users || [];
        renderUsers(appState.users);
      } catch (error) {
        console.warn("⚠️ Servidor inacessível, carregando contingência local de usuários.", error.message);
        
        const fallbackUsers = [
          { name: "Administrador", role: "admin" },
          { name: "Luiz", role: "tecnico" },
          { name: "Bruno", role: "tecnico" },
          { name: "Joao", role: "tecnico" },
          { name: "Placo", role: "tecnico" },
          { name: "Kaique", role: "tecnico" },
          { name: "Cauã", role: "tecnico" }
        ];
        
        appState.users = fallbackUsers;
        renderUsers(fallbackUsers);
      }
    }

    // Alimenta o Select do formulário
    function renderUsers(usersList) {
      const selectElement = document.getElementById('user-select');
      if (!selectElement) return;

      selectElement.innerHTML = '<option value="" disabled selected>Selecione seu usuário</option>';
      usersList.forEach(user => {
        const option = document.createElement('option');
        option.value = user.name;
        option.textContent = user.name;
        selectElement.appendChild(option);
      });
    }

    // Formulário de envio de Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('user-select').value;
      const pin = document.getElementById('pin-input').value;
      const errorDiv = document.getElementById('error-message');
      
      errorDiv.style.display = 'none';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, pin })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Falha ao efetuar login.");
        }

        // Salva dados na sessão local para persistência de abas
        localStorage.setItem("currentUser", JSON.stringify(result.user));
        
        alert(`Bem-vindo, ${result.user.name}!`);
        
        // Ativa a transição visual e renderiza o conteúdo do painel
        showDashboard(result.user, result.state);
        
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
      }
    });

    // Função responsável por alternar as telas e exibir a Dashboard
    function showDashboard(user, stateData) {
      document.getElementById('login-screen').style.display = 'none';
      
      const dashboard = document.getElementById('dashboard-container');
      dashboard.style.display = 'block';
      document.body.style.alignItems = 'flex-start'; // Ajusta alinhamento para telas longas

      document.getElementById('nav-user-name').textContent = user.name;
      document.getElementById('nav-user-role').textContent = user.role;

      if (stateData) {
        updateTables(stateData);
      } else {
        fetch('/api/bootstrap')
          .then(res => res.json())
          .then(data => updateTables(data))
          .catch(err => console.error("Erro ao atualizar tabelas do painel:", err));
      }
    }

    // Atualiza dinamicamente as tabelas de insumos do painel com os dados reais do backend
    function updateTables(data) {
      // 1. Tabela de Insumos
      const itemsBody = document.querySelector('#items-table tbody');
      if (itemsBody && data.items && data.items.length > 0) {
        itemsBody.innerHTML = '';
        data.items.forEach(item => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td><strong>${item.code}</strong></td>
            <td>${item.name}</td>
            <td>${item.category || ''}</td>
            <td style="color: ${item.qty <= item.min ? 'var(--primary-color)' : 'inherit'}; font-weight: bold;">${item.qty}</td>
            <td>${item.min || 0}</td>
            <td>${item.supplier || ''}</td>
          `;
          itemsBody.appendChild(row);
        });
      }

      // 2. Tabela de Solicitações
      const reqsBody = document.querySelector('#requests-table tbody');
      if (reqsBody && data.requests && data.requests.length > 0) {
        reqsBody.innerHTML = '';
        data.requests.forEach(req => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${req.technician}</td>
            <td>${req.itemName}</td>
            <td><strong>${req.qty}</strong></td>
          `;
          reqsBody.appendChild(row);
        });
      }
    }

    // Função para fazer logout e limpar a sessão
    function logout() {
      localStorage.clear();
      window.location.reload();
    }

    document.addEventListener('DOMContentLoaded', initBootstrap);
  </script>
</body>
</html>
