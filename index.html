<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow - Acesso Operacional</title>
  <style>
    :root {
      --bg-color: #121214;
      --card-bg: #1a1a1e;
      --text-color: #ffffff;
      --text-secondary: #a8a8b3;
      --primary-color: #e51e3d;
      --primary-hover: #c21330;
      --input-bg: #202024;
      --border-color: #29292e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      background-color: var(--card-bg);
      padding: 2.5rem;
      border-radius: 8px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .logo-box {
      background-color: var(--primary-color);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 1.4rem;
    }

    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .header-text p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .title-section {
      margin-bottom: 1.5rem;
    }

    .title-section p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.3rem;
    }

    .title-section h2 {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    select, input {
      width: 100%;
      padding: 0.85rem;
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-color);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      border-color: var(--primary-color);
    }

    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a8a8b3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1em;
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      background-color: var(--primary-hover);
    }

    .error-msg {
      color: #ff3333;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="header-logo">
      <div class="logo-box">s</div>
      <div class="header-text">
        <h1>StockFlow</h1>
        <p>Acesso operacional</p>
      </div>
    </div>

    <div class="title-section">
      <p>Entrar</p>
      <h2>Selecione seu usuário</h2>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="user-select">Usuário</label>
        <select id="user-select" required>
          <option value="" disabled selected>Carregando usuários...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="pin-input">PIN</label>
        <input type="password" id="pin-input" placeholder="0000" maxlength="10" required />
      </div>

      <div id="error-message" class="error-msg"></div>

      <button type="submit" class="btn-submit">Entrar</button>
    </form>
  </div>

  <script>
    // Estado global do frontend
    let appState = {
      users: []
    };

    // 1. Busca os dados iniciais do servidor
    async function initBootstrap() {
      const selectElement = document.getElementById('user-select');
      try {
        // Rota relativa evita quebrar no Render procurando 'localhost'
        const response = await fetch('/api/bootstrap');
        if (!response.ok) throw new Error("Erro na resposta do servidor");
        
        const data = await response.json();
        appState.users = data.users || [];
        
        renderUsers(appState.users);
      } catch (error) {
        console.warn("⚠️ Servidor ou banco offline. Carregando lista de contingência local no frontend.", error.message);
        
        // Plano B: Se a rede do Render/Banco falhar, renderiza localmente de forma garantida
        const fallbackUsers = [
          { name: "Administrador", role: "admin" },
          { name: "Luiz", role: "tecnico" },
          { name: "Bruno", role: "tecnico" },
          { name: "Joao", role: "tecnico" },
          { name: "Placo", role: "tecnico" },
          { name: "Kaique", role: "tecnico" },
          { name: "Cauã", role: "tecnico" }
        ];
        
        appState.users = fallbackUsers;
        renderUsers(fallbackUsers);
      }
    }

    // 2. Renderiza as opções dentro do elemento HTML select
    function renderUsers(usersList) {
      const selectElement = document.getElementById('user-select');
      if (!selectElement) return;

      selectElement.innerHTML = '<option value="" disabled selected>Selecione seu usuário</option>';

      if (usersList && usersList.length > 0) {
        usersList.forEach(user => {
          const option = document.createElement('option');
          option.value = user.name;
          option.textContent = user.name;
          selectElement.appendChild(option);
        });
        console.log(`${usersList.length} usuários carregados no seletor.`);
      } else {
        selectElement.innerHTML = '<option value="" disabled selected>Nenhum usuário encontrado</option>';
      }
    }

    // 3. Gerencia o envio do formulário de login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('user-select').value;
      const pin = document.getElementById('pin-input').value;
      const errorDiv = document.getElementById('error-message');
      
      errorDiv.style.display = 'none';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, pin })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Falha ao efetuar login.");
        }

        console.log("Login efetuado com sucesso!", result);
        alert(`Bem-vindo, ${result.user.name}!`);
        
        // Aqui você pode redirecionar para a dashboard do app, ex:
        // window.location.href = "/dashboard.html";
        
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
      }
    });

    // Inicializa a carga assim que a página é lida
    document.addEventListener('DOMContentLoaded', initBootstrap);
  </script>
</body>
</html>
