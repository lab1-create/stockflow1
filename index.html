<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockFlow ERP</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/usuarios.css">
  </head>
  <body class="locked">
    <section id="login-screen" class="login-screen">
      <form id="login-form" class="login-card">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <strong>StockFlow</strong>
            <span>ERP de estoque técnico</span>
          </div>
        </div>
        <div>
          <p class="eyebrow">Acesso seguro</p>
          <h1>Entrar</h1>
        </div>
        <label>Email<input id="login-email" type="email" autocomplete="username" required placeholder="admin@stockflow.local"></label>
        <label>Senha<input id="login-senha" type="password" autocomplete="current-password" required placeholder="Senha"></label>
        <button class="primary-action wide">Entrar</button>
        <p id="login-error" class="form-error"></p>
        <p class="muted">Usuários migrados usam o email gerado e a senha igual ao PIN antigo.</p>
      </form>
    </section>

    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <div class="brand">
            <div class="brand-mark">S</div>
            <div>
              <strong>StockFlow</strong>
              <span>Painel</span>
            </div>
          </div>
          <button id="toggle-sidebar" class="icon-button">◂</button>
        </div>
        <div class="nav">
          <button class="nav-item active admin-only" data-view="dashboard">Dashboard</button>
          <button class="nav-item" data-view="produtos">Produtos</button>
          <button class="nav-item" data-view="entradas">Entradas</button>
          <button class="nav-item" data-view="saidas">Saídas</button>
          <button class="nav-item admin-only" data-view="historico">Histórico</button>
          <button class="nav-item admin-only" data-view="relatorios">Relatórios</button>
          <button class="nav-item admin-only" data-view="usuarios">Usuários</button>
          <button class="nav-item admin-only" data-view="configuracoes">Configurações</button>
        </div>
        <div class="sidebar-footer">
          <span id="session-label">Sessão</span>
          <button id="logout-button" class="ghost-action">Sair</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button id="mobile-menu" class="icon-button">☰</button>
          <div>
            <p class="eyebrow">StockFlow</p>
            <h2 id="view-title">Dashboard</h2>
          </div>
          <label class="search">Pesquisar<input id="global-search" type="search" placeholder="Produto, código, técnico..."></label>
        </header>

        <section id="dashboard-view" class="view active"></section>
        <section id="produtos-view" class="view"></section>
        <section id="entradas-view" class="view"></section>
        <section id="saidas-view" class="view"></section>
        <section id="historico-view" class="view"></section>
        <section id="relatorios-view" class="view"></section>
        <section id="usuarios-view" class="view"></section>
        <section id="configuracoes-view" class="view"></section>
      </main>
    </div>

    <dialog id="modal">
      <form id="modal-form" method="dialog" class="dialog-body"></form>
    </dialog>
    <div id="toast-stack" class="toast-stack"></div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
